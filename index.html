<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="酸種排程師">
<meta name="theme-color" content="#f7f3ee">
<title>酸種排程師</title>
<link rel="manifest" href="manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
/* ── tokens ─────────────────────────────────────────── */
:root {
  --bg:          oklch(96.5% 0.014 75);
  --surface:     oklch(99%   0.008 75);
  --surface-alt: oklch(94%   0.018 72);
  --border:      oklch(88%   0.015 72);
  --border-soft: oklch(92%   0.012 72);
  --text-1:      oklch(18%   0.025 60);
  --text-2:      oklch(45%   0.022 65);
  --text-3:      oklch(62%   0.018 68);
  --amber:       oklch(66%   0.13  65);
  --amber-bg:    oklch(94%   0.05  75);
  --amber-dark:  oklch(52%   0.12  55);
  --red:         oklch(56%   0.18  25);
  --shadow-sm:   0 1px 3px oklch(0% 0 0 / .06), 0 1px 2px oklch(0% 0 0 / .04);
  --shadow-md:   0 4px 12px oklch(0% 0 0 / .07), 0 2px 4px oklch(0% 0 0 / .04);
  --r-sm: 8px;
  --r-md: 12px;
  --r-lg: 16px;
}

/* ── reset ───────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { height: 100%; }
body {
  min-height: 100%;
  background: var(--bg);
  font-family: 'DM Sans', system-ui, sans-serif;
  font-size: 15px;
  color: var(--text-1);
  -webkit-font-smoothing: antialiased;
  padding-bottom: env(safe-area-inset-bottom, 24px);
}

/* ── layout ──────────────────────────────────────────── */
.shell {
  max-width: 480px;
  margin: 0 auto;
  padding: 0 16px;
}

/* ── header ──────────────────────────────────────────── */
.app-header {
  padding: 28px 0 20px;
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
}
.app-name {
  font-family: 'Cormorant Garamond', serif;
  font-size: 30px;
  font-weight: 600;
  letter-spacing: -0.01em;
  color: var(--text-1);
  line-height: 1;
}
.app-name em {
  font-style: italic;
  color: var(--amber-dark);
}
.app-sub {
  font-size: 11px;
  color: var(--text-3);
  letter-spacing: 0.08em;
  text-transform: uppercase;
  margin-bottom: 2px;
}
.install-btn {
  display: none;
  align-items: center;
  gap: 5px;
  font-size: 12px;
  font-family: 'DM Sans', sans-serif;
  color: var(--amber-dark);
  background: var(--amber-bg);
  border: none;
  border-radius: 20px;
  padding: 6px 12px;
  cursor: pointer;
  font-weight: 500;
}
.install-btn.visible { display: flex; }

/* ── card ────────────────────────────────────────────── */
.card {
  background: var(--surface);
  border: 1px solid var(--border-soft);
  border-radius: var(--r-lg);
  padding: 18px;
  margin-bottom: 12px;
  box-shadow: var(--shadow-sm);
}

/* ── section label ───────────────────────────────────── */
.card-label {
  font-size: 10.5px;
  font-weight: 500;
  color: var(--text-3);
  text-transform: uppercase;
  letter-spacing: 0.1em;
  margin-bottom: 14px;
}

/* ── mode tabs ───────────────────────────────────────── */
.mode-tabs {
  display: flex;
  gap: 6px;
  margin-bottom: 16px;
  background: var(--surface-alt);
  border-radius: var(--r-md);
  padding: 4px;
}
.mode-tab {
  flex: 1;
  padding: 9px 4px;
  font-size: 13px;
  font-weight: 500;
  font-family: 'DM Sans', sans-serif;
  border: none;
  border-radius: var(--r-sm);
  background: transparent;
  color: var(--text-2);
  cursor: pointer;
  transition: all .2s;
  text-align: center;
  line-height: 1.3;
}
.mode-tab.active {
  background: var(--surface);
  color: var(--text-1);
  box-shadow: var(--shadow-sm);
}

/* ── field row ───────────────────────────────────────── */
.field-row {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 10px;
}
.field-row:last-of-type { margin-bottom: 0; }
.field-label {
  font-size: 13.5px;
  color: var(--text-2);
  min-width: 90px;
  flex-shrink: 0;
}
.field-input {
  font-size: 14px;
  font-family: 'DM Sans', sans-serif;
  font-weight: 500;
  color: var(--text-1);
  background: var(--surface-alt);
  border: 1px solid var(--border);
  border-radius: var(--r-sm);
  padding: 8px 12px;
  outline: none;
  transition: border-color .15s;
  -webkit-appearance: none;
  appearance: none;
}
.field-input:focus { border-color: var(--amber); }
input[type=date].field-input { min-width: 148px; }
input[type=time].field-input { min-width: 100px; }

/* ── calculate button ────────────────────────────────── */
.calc-btn {
  width: 100%;
  margin-top: 16px;
  padding: 13px;
  font-size: 14px;
  font-weight: 500;
  font-family: 'DM Sans', sans-serif;
  color: var(--surface);
  background: var(--text-1);
  border: none;
  border-radius: var(--r-md);
  cursor: pointer;
  letter-spacing: 0.02em;
  transition: opacity .15s, transform .1s;
  -webkit-tap-highlight-color: transparent;
}
.calc-btn:active { opacity: .85; transform: scale(.99); }

/* ── result card ─────────────────────────────────────── */
.result-card {
  display: none;
  animation: fadeUp .3s ease both;
}
.result-card.visible { display: block; }

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(10px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ── day header ──────────────────────────────────────── */
.day-group { margin-bottom: 4px; }
.day-header {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 12px 0 6px;
  font-size: 11px;
  font-weight: 500;
  color: var(--text-3);
  letter-spacing: 0.08em;
  text-transform: uppercase;
}
.day-header:first-child { padding-top: 0; }
.day-badge {
  background: var(--amber-bg);
  color: var(--amber-dark);
  border-radius: 20px;
  padding: 2px 9px;
  font-size: 11px;
  font-weight: 500;
}

/* ── timeline row ────────────────────────────────────── */
.tl-row {
  display: flex;
  align-items: center;
  gap: 0;
  padding: 9px 0;
  border-bottom: 1px solid var(--border-soft);
  transition: background .1s;
}
.tl-row:last-of-type,
.tl-row:has(+ .day-header) {
  border-bottom: none;
  padding-bottom: 14px;
}

.tl-time {
  min-width: 52px;
  flex-shrink: 0;
  font-size: 14px;
  font-weight: 500;
  color: var(--text-1);
  font-variant-numeric: tabular-nums;
}
.tl-dot {
  width: 22px;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
}
.tl-dot-inner {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--border);
}
.tl-row.passive .tl-dot-inner { background: var(--amber); opacity: .6; }
.tl-row.preheat .tl-dot-inner { background: var(--red); opacity: .7; }

.tl-label {
  flex: 1;
  font-size: 13.5px;
  color: var(--text-2);
  line-height: 1.4;
}
.tl-label strong {
  display: block;
  font-weight: 500;
  color: var(--text-1);
  font-size: 13.5px;
}
.tl-label small {
  font-size: 12px;
  color: var(--text-3);
}

.tl-right {
  display: flex;
  align-items: center;
  gap: 4px;
  flex-shrink: 0;
}

/* ── duration select ─────────────────────────────────── */
.dur-wrap {
  position: relative;
  display: inline-flex;
  align-items: center;
}
.dur-wrap select {
  -webkit-appearance: none;
  appearance: none;
  border: 1px solid var(--border);
  background: var(--surface-alt);
  border-radius: var(--r-sm);
  font-size: 13px;
  font-weight: 500;
  font-family: 'DM Sans', sans-serif;
  color: var(--text-1);
  padding: 5px 22px 5px 9px;
  cursor: pointer;
  outline: none;
  transition: border-color .15s;
}
.dur-wrap select:focus { border-color: var(--amber); }
.dur-wrap::after {
  content: '';
  position: absolute;
  right: 7px;
  top: 50%;
  transform: translateY(-60%);
  width: 0; height: 0;
  border-left: 4px solid transparent;
  border-right: 4px solid transparent;
  border-top: 5px solid var(--text-3);
  pointer-events: none;
}
.dur-static {
  font-size: 13px;
  font-weight: 500;
  color: var(--text-3);
  padding: 5px 0;
}

/* ── remove mode btn ─────────────────────────────────── */
.mode-remove-inline {
  display: inline-flex;
  align-items: center;
  margin-left: 6px;
  padding: 1px 6px;
  font-size: 10px;
  font-family: 'DM Sans', sans-serif;
  font-weight: 500;
  color: var(--text-3);
  border: 1px solid var(--border);
  border-radius: 20px;
  background: transparent;
  cursor: pointer;
  vertical-align: middle;
  transition: all .15s;
  line-height: 1.6;
}
.mode-remove-inline:hover { border-color: var(--red); color: var(--red); background: oklch(97% 0.015 25); }

/* ── add mode row ────────────────────────────────────── */
.add-row {
  display: flex;
  gap: 8px;
  padding-top: 12px;
  border-top: 1px solid var(--border-soft);
  margin-top: 4px;
}
.add-mode-btn {
  flex: 1;
  padding: 9px;
  font-size: 13px;
  font-weight: 500;
  font-family: 'DM Sans', sans-serif;
  color: var(--text-2);
  border: 1px dashed var(--border);
  border-radius: var(--r-sm);
  background: transparent;
  cursor: pointer;
  transition: all .15s;
  -webkit-tap-highlight-color: transparent;
}
.add-mode-btn:hover { border-color: var(--amber); color: var(--amber-dark); background: var(--amber-bg); }

/* ── offline banner ──────────────────────────────────── */
.offline-banner {
  display: none;
  background: oklch(94% 0.05 40);
  color: oklch(40% 0.1 40);
  font-size: 12px;
  text-align: center;
  padding: 6px;
  border-radius: var(--r-sm);
  margin-bottom: 10px;
}
.offline-banner.visible { display: block; }

/* ── footer ──────────────────────────────────────────── */
.app-footer {
  text-align: center;
  font-size: 11px;
  color: var(--text-3);
  padding: 16px 0 8px;
  letter-spacing: 0.04em;
}
</style>
</head>
<body>
<div class="shell">

  <!-- header -->
  <header class="app-header">
    <div>
      <div class="app-sub">Sourdough Planner</div>
      <div class="app-name"><em>酸種</em>排程師</div>
    </div>
    <button class="install-btn" id="installBtn">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 16l-4-4h3V4h2v8h3l-4 4z"/><path d="M20 20H4v-2h16v2z"/></svg>
      加入主畫面
    </button>
  </header>

  <div class="offline-banner" id="offlineBanner">⚠ 目前離線，使用快取版本</div>

  <!-- input card -->
  <div class="card">
    <div class="card-label">計算目標</div>

    <div class="mode-tabs">
      <button class="mode-tab active" id="tabBake" onclick="switchTab('bake')">指定出爐時間</button>
      <button class="mode-tab" id="tabChill" onclick="switchTab('chill')">指定開始冷藏時間</button>
    </div>

    <div id="paneBake">
      <div class="field-row">
        <span class="field-label">日期</span>
        <input class="field-input" type="date" id="bakeDate">
      </div>
      <div class="field-row">
        <span class="field-label">出爐時間</span>
        <input class="field-input" type="time" id="bakeTime" value="17:00">
      </div>
    </div>
    <div id="paneChill" style="display:none">
      <div class="field-row">
        <span class="field-label">日期</span>
        <input class="field-input" type="date" id="chillDate">
      </div>
      <div class="field-row">
        <span class="field-label">開始冷藏</span>
        <input class="field-input" type="time" id="chillTime" value="22:00">
      </div>
    </div>

    <button class="calc-btn" onclick="calculate()">計算時程 →</button>
  </div>

  <!-- result card -->
  <div class="card result-card" id="result">
    <div class="card-label">製作時程</div>
    <div id="tlBody"></div>
    <div class="add-row">
      <button class="add-mode-btn" onclick="addMode('A')">+ A 模式</button>
      <button class="add-mode-btn" onclick="addMode('B')">+ B 模式</button>
    </div>
  </div>

  <footer class="app-footer">以本地時間計算 · 資料存於裝置</footer>
</div>

<script>
/* ─── i18n step definitions ─────────────────────────── */
const STEP_INFO = {
  s1: { short: '母種', detail: '模式 {mode}（第 {n} 次）' },
  s2: { short: '麵團種', detail: 'C 模式' },
  s3: { short: '混合', detail: '' },
  s4: { short: '自溶', detail: '' },
  s5: { short: '攪拌', detail: '' },
  s6: { short: '基本發酵', detail: '' },
  s7: { short: '分割', detail: '' },
  s8: { short: '初步整形 + 靜置', detail: '' },
  s9: { short: '最後整形', detail: '' },
  s10: { short: '調整發酵', detail: '' },
  s11: { short: '冷藏發酵', detail: '' },
  s12a: { short: '預熱烤箱', detail: '' },
  s12b: { short: '烘烤', detail: '' },
};

const WD = ['日','一','二','三','四','五','六'];
let modes = ['A', 'B'];
let tlSteps = [];

/* ─── init dates ────────────────────────────────────── */
(function() {
  const fmt = d => {
    const y = d.getFullYear();
    const mo = String(d.getMonth()+1).padStart(2,'0');
    const day = String(d.getDate()).padStart(2,'0');
    return `${y}-${mo}-${day}`;
  };
  const today = new Date();
  document.getElementById('bakeDate').value = fmt(today);
  document.getElementById('chillDate').value = fmt(today);

  // restore saved settings
  const saved = JSON.parse(localStorage.getItem('sourdough_settings') || '{}');
  if (saved.tab) switchTab(saved.tab, true);
  if (saved.bakeDate) document.getElementById('bakeDate').value = saved.bakeDate;
  if (saved.bakeTime) document.getElementById('bakeTime').value = saved.bakeTime;
  if (saved.chillDate) document.getElementById('chillDate').value = saved.chillDate;
  if (saved.chillTime) document.getElementById('chillTime').value = saved.chillTime;
  if (saved.modes) modes = saved.modes;
  if (saved.stepVals) window._savedStepVals = saved.stepVals;

  // auto-calculate if we have saved state
  if (saved.tab) calculate();
})();

/* ─── persist settings ──────────────────────────────── */
function saveSettings() {
  const isBake = document.getElementById('tabBake').classList.contains('active');
  const stepVals = {};
  tlSteps.forEach(s => { if (s.rangeVal !== undefined) stepVals[s.id] = s.rangeVal; });
  localStorage.setItem('sourdough_settings', JSON.stringify({
    tab: isBake ? 'bake' : 'chill',
    bakeDate: document.getElementById('bakeDate').value,
    bakeTime: document.getElementById('bakeTime').value,
    chillDate: document.getElementById('chillDate').value,
    chillTime: document.getElementById('chillTime').value,
    modes,
    stepVals,
  }));
}

/* ─── tab switching ─────────────────────────────────── */
function switchTab(t, silent) {
  document.getElementById('tabBake').classList.toggle('active', t === 'bake');
  document.getElementById('tabChill').classList.toggle('active', t === 'chill');
  document.getElementById('paneBake').style.display = t === 'bake' ? '' : 'none';
  document.getElementById('paneChill').style.display = t === 'chill' ? '' : 'none';
  if (!silent) saveSettings();
}

/* ─── date helpers ──────────────────────────────────── */
function parseLocal(dateStr, timeStr) {
  const [y, mo, d] = dateStr.split('-').map(Number);
  const [h, m] = timeStr.split(':').map(Number);
  return new Date(y, mo-1, d, h, m, 0, 0);
}
function fmtDateLabel(base, offsetMin) {
  const d = new Date(base.getTime() + offsetMin * 60000);
  return `${d.getMonth()+1}/${d.getDate()}（${WD[d.getDay()]}）`;
}
function fmtTime(base, offsetMin) {
  const d = new Date(base.getTime() + offsetMin * 60000);
  return String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0');
}
function fmtDur(mins) {
  if (mins < 60) return mins + 'min';
  const h = Math.floor(mins / 60), m = mins % 60;
  return m ? `${h}h${m}min` : `${h}h`;
}

/* ─── build steps ───────────────────────────────────── */
function buildSteps() {
  const saved = window._savedStepVals || {};
  const prev = id => {
    const s = tlSteps.find(s => s.id === id);
    return s ? s.rangeVal : saved[id];
  };

  const steps = [];

  modes.forEach((m, i) => {
    const isA = m === 'A';
    const def = isA ? 16 : 8;
    const rv = prev(`s1_${i}`) ?? def;
    steps.push({
      id: `s1_${i}`,
      baseId: 's1',
      label: STEP_INFO.s1.short,
      sub: `模式 ${m}（第 ${i+1} 次）`,
      dur: rv * 60, passive: true,
      range: isA ? {min:16,max:20,step:1,unit:'h',mul:60} : {min:6,max:10,step:1,unit:'h',mul:60},
      rangeVal: rv, mode: m, modeIdx: i,
    });
  });

  const cVal = prev('s2') ?? 16;
  steps.push({ id:'s2', baseId:'s2', label: STEP_INFO.s2.short, sub:'C 模式', dur:cVal*60, passive:true, range:{min:12,max:16,step:1,unit:'h',mul:60}, rangeVal:cVal });
  steps.push({ id:'s3', baseId:'s3', label: STEP_INFO.s3.short, sub:'', dur:15 });
  steps.push({ id:'s4', baseId:'s4', label: STEP_INFO.s4.short, sub:'', dur:60, passive:true });
  steps.push({ id:'s5', baseId:'s5', label: STEP_INFO.s5.short, sub:'', dur:90 });

  const bfVal = prev('s6') ?? 3.5;
  steps.push({ id:'s6', baseId:'s6', label: STEP_INFO.s6.short, sub:'', dur:bfVal*60, passive:true, range:{min:3,max:4,step:0.5,unit:'h',mul:60}, rangeVal:bfVal });
  steps.push({ id:'s7', baseId:'s7', label: STEP_INFO.s7.short, sub:'', dur:5 });
  steps.push({ id:'s8', baseId:'s8', label: STEP_INFO.s8.short, sub:'', dur:30 });
  steps.push({ id:'s9', baseId:'s9', label: STEP_INFO.s9.short, sub:'', dur:15 });

  const prevExt = tlSteps.find(s => s.id === 's10');
  if (prevExt && prevExt.dur > 0)
    steps.push({ id:'s10', baseId:'s10', label: STEP_INFO.s10.short, sub:'', dur:prevExt.dur, passive:true });

  const cfVal = prev('s11') ?? 24;
  steps.push({ id:'s11', baseId:'s11', label: STEP_INFO.s11.short, sub:'', dur:cfVal*60, passive:true, isChill:true, range:{min:20,max:30,step:1,unit:'h',mul:60}, rangeVal:cfVal });
  steps.push({ id:'s12a', baseId:'s12a', label: STEP_INFO.s12a.short, sub:'', dur:60, preheat:true });
  steps.push({ id:'s12b', baseId:'s12b', label: STEP_INFO.s12b.short, sub:'', dur:15 });

  return steps;
}

/* ─── compute timeline ──────────────────────────────── */
function computeTimeline(steps) {
  const isBake = document.getElementById('tabBake').classList.contains('active');
  const seqSteps = steps.filter(s => !s.preheat);
  const totalSeq = seqSteps.reduce((a, s) => a + s.dur, 0);

  let step1Start;
  if (isBake) {
    const anchor = parseLocal(document.getElementById('bakeDate').value, document.getElementById('bakeTime').value);
    step1Start = new Date(anchor.getTime() - totalSeq * 60000);
  } else {
    const anchor = parseLocal(document.getElementById('chillDate').value, document.getElementById('chillTime').value);
    const chillIdx = seqSteps.findIndex(s => s.isChill);
    const beforeChill = seqSteps.slice(0, chillIdx).reduce((a, s) => a + s.dur, 0);
    step1Start = new Date(anchor.getTime() - beforeChill * 60000);
  }

  let cursor = 0, chillEndOffset = 0;
  const rows = [];
  for (const s of steps) {
    if (s.preheat) {
      rows.push({ ...s, offset: chillEndOffset - 60 });
    } else {
      rows.push({ ...s, offset: cursor });
      if (s.isChill) chillEndOffset = cursor + s.dur;
      cursor += s.dur;
    }
  }
  return { rows, baseDate: step1Start };
}

/* ─── render ────────────────────────────────────────── */
function calculate() {
  tlSteps = buildSteps();
  renderTimeline();
  saveSettings();
}

function renderTimeline() {
  const { rows, baseDate } = computeTimeline(tlSteps);
  let currentDay = null;
  let dayNum = 1;

  // group by day
  const groups = [];
  let currentGroup = null;
  for (const s of rows) {
    const dayLabel = fmtDateLabel(baseDate, s.offset);
    if (dayLabel !== currentDay) {
      currentDay = dayLabel;
      currentGroup = { label: dayLabel, dayNum: dayNum++, rows: [] };
      groups.push(currentGroup);
    }
    currentGroup.rows.push(s);
  }

  let html = '';
  for (const g of groups) {
    html += `<div class="day-header"><span class="day-badge">Day ${g.dayNum} &nbsp; ${g.label}</span></div>`;
    for (const s of g.rows) {
      const timeStr = fmtTime(baseDate, s.offset);
      let rightHtml = '';

      if (s.range) {
        const opts = [];
        for (let v = s.range.min; v <= s.range.max + 0.001; v += s.range.step) {
          const vr = Math.round(v * 10) / 10;
          opts.push(`<option value="${vr}"${vr === s.rangeVal ? ' selected' : ''}>${vr}${s.range.unit}</option>`);
        }
        rightHtml += `<div class="dur-wrap"><select onchange="updateStep('${s.id}',parseFloat(this.value),${s.range.mul})">${opts.join('')}</select></div>`;
      } else {
        rightHtml += `<span class="dur-static">${fmtDur(s.dur)}</span>`;
      }

      const rowClass = ['tl-row', s.passive ? 'passive' : '', s.preheat ? 'preheat' : ''].filter(Boolean).join(' ');
      const removeBtn = s.modeIdx !== undefined
        ? `<button class="mode-remove-inline" onclick="removeMode(${s.modeIdx})" title="移除此模式">移除</button>`
        : '';
      const sub = s.sub ? `<small>${s.sub}${removeBtn}</small>` : '';
      html += `<div class="${rowClass}">
        <div class="tl-time">${timeStr}</div>
        <div class="tl-dot"><div class="tl-dot-inner"></div></div>
        <div class="tl-label"><strong>${s.label}</strong>${sub}</div>
        <div class="tl-right">${rightHtml}</div>
      </div>`;
    }
  }

  document.getElementById('tlBody').innerHTML = html;
  const rc = document.getElementById('result');
  rc.classList.add('visible');
  // re-trigger animation
  rc.style.animation = 'none';
  rc.offsetHeight; // reflow
  rc.style.animation = '';
}

function updateStep(id, val, mul) {
  const s = tlSteps.find(s => s.id === id);
  if (!s) return;
  s.dur = Math.round(val * mul);
  s.rangeVal = val;
  renderTimeline();
  saveSettings();
}
function addMode(m) {
  modes.push(m);
  tlSteps = buildSteps();
  renderTimeline();
  saveSettings();
}
function removeMode(i) {
  if (modes.length <= 1) return;
  modes.splice(i, 1);
  tlSteps = buildSteps();
  renderTimeline();
  saveSettings();
}

/* ─── PWA install ───────────────────────────────────── */
let deferredPrompt = null;
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  document.getElementById('installBtn').classList.add('visible');
});
document.getElementById('installBtn').addEventListener('click', async () => {
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  const { outcome } = await deferredPrompt.userChoice;
  deferredPrompt = null;
  if (outcome === 'accepted') document.getElementById('installBtn').classList.remove('visible');
});
window.addEventListener('appinstalled', () => {
  document.getElementById('installBtn').classList.remove('visible');
});

/* ─── offline indicator ─────────────────────────────── */
window.addEventListener('online',  () => document.getElementById('offlineBanner').classList.remove('visible'));
window.addEventListener('offline', () => document.getElementById('offlineBanner').classList.add('visible'));
if (!navigator.onLine) document.getElementById('offlineBanner').classList.add('visible');

/* ─── service worker ────────────────────────────────── */
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').catch(() => {});
}
</script>
